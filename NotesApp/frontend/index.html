<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>My Notes</h1>
        <p>Save your thoughts easily</p>
    </header>

    <div class="note-form">
        <input id="title" placeholder="Title">
        <textarea id="text" placeholder="Write note..."></textarea>
        <button id="addBtn">Add Note</button>
    </div>

    <div class="notes-grid"></div>

</div>

<script src="script.js"></script>
</body>
</html>
